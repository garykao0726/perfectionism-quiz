<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完美主義指數測驗 — 全部結果總覽</title>
<style>
  :root {
    --ink: #1f2421;
    --paper: #faf7f2;
    --accent: #a54a1a;
    --accent-light: #e2ceb9;
    --line: #ddd3c4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "PingFang TC", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #777; margin-bottom: 24px; }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 16px; margin: 0 0 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
  th { color: #777; font-weight: 600; font-size: 12px; }
  .cat-row { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .cat-row:last-child { border-bottom: none; }
  .cat-row .name { font-weight: 700; font-size: 14px; }
  .cat-row .range { font-size: 12px; color: #888; margin-left: 6px; }
  .cat-row .desc { font-size: 13px; color: #555; margin-top: 4px; }
  .cat-row .detail { font-size: 12px; color: #777; margin-top: 6px; }
  #refreshBtn {
    display: block; margin: 0 auto 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; cursor: pointer;
  }
  .pct { font-family: "Space Mono", monospace; font-weight: 700; color: var(--accent); }
  #meta { font-size: 13px; color: #666; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>完美主義指數測驗 — 全部結果總覽</h1>
  <div class="sub">給帶討論的人看，不需要重新填寫測驗</div>

  <button id="refreshBtn">重新整理</button>

  <div class="card">
    <h2>填寫統計</h2>
    <div id="meta">載入中...</div>
  </div>

  <div class="card">
    <h2>所有填寫紀錄</h2>
    <table>
      <thead><tr><th>時間</th><th>指數</th><th>類型</th></tr></thead>
      <tbody id="responseRows"><tr><td colspan="3">載入中...</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h2>五大類型完整說明</h2>
    <div id="categoryList"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxh31qdUxajfxQZlVbX03Q0rcSoiHcSMI7oYz_bq0nPKPJ9XHSNLHW5njOEniEvu3IC/exec";

const CATEGORY_DETAIL = {
  "停滯不前的完美囚徒 🐢": { animal: "烏龜", detail: "常被選擇癱瘓困住，害怕失敗而乾脆不開始。書中提到，完美主義有時就像是「扛一副過重的盾牌而無法前進」；烏龜堅硬的外殼，正像是完美主義者為自己打造的「防空洞」。因為害怕一開始就失敗，或者過度思考導致選擇癱瘓，遇到挑戰的第一反應就是把頭縮回殼裡，留在舒適圈不冒險——而最糟糕的決定，往往就是「不行動」。" },
  "永遠嫌不夠的焦慮跑者 🐹": { animal: "滾輪上的倉鼠", detail: "永遠對自己不滿意，常覺得自己是僥倖過關的冒牌者。這種人永遠處於過度驅動的狀態，腦中不停反思，充斥著「我本來應該可以做得更好」的念頭。就像在滾輪上狂奔的倉鼠，即使跑得再快、表現得再好，因為內心只接受「百分之百的完美」，所以永遠覺得自己還沒抵達終點，甚至把成功當作僥倖（冒牌者症候群），在焦慮中不斷消耗動能。" },
  "偶爾卡關的條件控 🐈": { animal: "挑剔的貓咪", detail: "平時正常，但面對某些在意的事會執著於必須「條件完美」才行動。貓咪能力很強，但只要罐頭口味不對、貓砂盆位置不好，牠們寧可罷工。這類人就像貓咪一樣，平時表現正常，但在某些事情上非常執著於外在條件——如同打算運動卻覺得音樂不夠好、運動服不合適、時間不完美，結果什麼也沒開始。他們必須等待「萬事俱備」，否則就不願意跨出第一步。" },
  "擁抱微小進步的實踐家 🐜": { animal: "勤奮的螞蟻", detail: "明白行動比停滯有力量，出錯時能較快調整步伐。螞蟻不會想著一次搬動整座大山，而是專注於眼前的碎屑，慢慢累積——這正呼應了「微習慣」的核心策略：把目標設定到小到不可能失敗（例如每天只做一個伏地挺身）。他們深知每一次的微小前進都算數，這些看似微不足道的行動，經過時間累積與複利效應，最終會滾出巨大的能量與實質的進展。" },
  "自由奔放的不完美主義者 🦮": { animal: "快樂的黃金獵犬", detail: "追求卓越但不強求完美，重視「去做」而不是「做好」。黃金獵犬為了接住飛盤，會毫不猶豫地撲進泥巴坑，牠們不在乎弄髒毛髮，只在乎享受遊戲的過程——這完美詮釋了「不完美主義就是自由」的心態。當注意力放在體驗與學習上時，壓力就會轉化為一種遊戲，他們把錯誤視為指南針，不怕犯錯，勇敢且自由地享受行動帶來的樂趣。" }
};

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

async function load() {
  document.getElementById('meta').textContent = '載入中...';
  document.getElementById('responseRows').innerHTML = '<tr><td colspan="3">載入中...</td></tr>';
  try {
    const res = await fetch(API_URL + '?action=all');
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('meta').textContent = '載入失敗，請稍後再試';
    console.error(err);
  }
}

function render(data) {
  const responses = data.responses || [];
  const categories = data.categories || [];

  if (responses.length === 0) {
    document.getElementById('meta').textContent = '目前還沒有人填寫';
    document.getElementById('responseRows').innerHTML = '<tr><td colspan="3">目前還沒有資料</td></tr>';
  } else {
    const avg = Math.round(responses.reduce((a, r) => a + r.pct, 0) / responses.length);
    document.getElementById('meta').textContent = `共 ${responses.length} 人填寫，平均完美主義指數 ${avg}%`;
    document.getElementById('responseRows').innerHTML = responses.map(r => `
      <tr>
        <td>${fmtTime(r.timestamp)}</td>
        <td class="pct">${r.pct}%</td>
        <td>${r.category}</td>
      </tr>
    `).join('');
  }

  document.getElementById('categoryList').innerHTML = categories.map(c => {
    const detail = CATEGORY_DETAIL[c.name];
    return `
    <div class="cat-row">
      <span class="name">${c.name}</span><span class="range">（${c.min}–${c.max} 分${detail ? '・代表動物：' + detail.animal : ''}）</span>
      <div class="desc">${c.desc}</div>
      ${detail ? `<div class="detail">${detail.detail}</div>` : ''}
    </div>
  `;
  }).join('');
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
